<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark rounded-square background -->
  <rect width="512" height="512" rx="96" fill="#0c0a09"/>

  <!-- Vinyl record body -->
  <circle cx="256" cy="256" r="168" fill="#1a1612"/>
  <!-- Outer groove ring -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#2a221a" stroke-width="3"/>
  <!-- Inner groove rings -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="#221c14" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="128" fill="none" stroke="#221c14" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="108" fill="none" stroke="#221c14" stroke-width="1.5"/>

  <!-- Label area (gold) -->
  <circle cx="256" cy="256" r="72" fill="#d4a574"/>
  <!-- Label inner ring -->
  <circle cx="256" cy="256" r="72" fill="none" stroke="#c4945f" stroke-width="2"/>

  <!-- "C" letterform on label -->
  <path
    d="M285 222
       a46 46 0 1 0 0 68"
    fill="none"
    stroke="#0c0a09"
    stroke-width="14"
    stroke-linecap="round"
  />

  <!-- Spindle hole -->
  <circle cx="256" cy="256" r="10" fill="#0c0a09"/>

  <!-- Subtle gold edge highlight on the record -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#d4a574" stroke-width="1.5" opacity="0.25"/>
</svg>
